version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: saas_omnichannel
      POSTGRES_USER: ${POSTGRES_USER:-saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saas_dev_password}
    ports:
      - "5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./packages/db/docker/init.sh:/docker-entrypoint-initdb.d/00_init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [dev]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redisdata_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [dev]

  evolution-api:
    image: atendai/evolution-api:v2.2.3
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_GLOBAL_KEY:-evo_dev_key_change_me}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD:-saas_dev_password}@postgres:5432/evolution_api
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      CACHE_REDIS_ENABLED: 'true'
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evo
      SERVER_URL: http://localhost:8080
      WEBHOOK_GLOBAL_URL: ${API_BASE_URL:-http://host.docker.internal:3001}/api/webhooks/evolution
      WEBHOOK_GLOBAL_ENABLED: 'true'
      WEBHOOK_EVENTS_QRCODE_UPDATED: 'true'
      WEBHOOK_EVENTS_MESSAGES_UPSERT: 'true'
      WEBHOOK_EVENTS_CONNECTION_UPDATE: 'true'
      WEBHOOK_EVENTS_MESSAGES_UPDATE: 'true'
      DEL_INSTANCE: 'false'
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    networks: [dev]
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata_dev:
  redisdata_dev:

networks:
  dev:
    driver: bridge
