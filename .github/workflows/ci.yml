name: CI

on:
  push:
    branches: [main, 'fase-*']
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @saas/shared build && pnpm --filter @saas/db build

      - name: Typecheck API
        run: pnpm --filter @app/api typecheck

      - name: Typecheck Web
        run: pnpm --filter @app/web typecheck

      - name: Run tests
        run: pnpm --filter @app/api test
        env:
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzLXBhZA==

  build-docker:
    name: Docker Build (API)
    runs-on: ubuntu-latest
    needs: typecheck-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: saas-omnichannel-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: saas-omnichannel-web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://app.tudominio.co
          cache-from: type=gha
          cache-to: type=gha,mode=max
